                <option value="Los Angeles">Los Angeles</option>
                <option value="Bologna">Bologna</option>

            </label>
            <label>
              Filter by Usage:
              <input
                type="number"
                min="0"
                max="100"
                onChange={this.handleUsageFilterChange}
                placeholder="min %"
              />
            </label>
            <label>
              Filter by Top Cut:
              <input
                type="number"
                min="0"
