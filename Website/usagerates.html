<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Usage Rates - Competitive Pokémon Data</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.min.js"></script>
</head>
<body>

  <!-- Header and Navigation -->
  <div class="header-bar">
    Usage Rates
    <i class="fa-solid fa-percent icon"></i>
  </div>

  <nav>
    <div class="container">
      <div class="row">
        <div class="col-3">
          <ul class="list-unstyled">
            <li><a href="index.html">Home</a></li>
          </ul>
        </div>
        <div class="col-3">
          <ul class="list-unstyled">
            <li><a href="pokemon.html">By Pokémon</a></li>
          </ul>
        </div>
        <div class="col-3">
          <ul class="list-unstyled">
            <li><a href="usagerates.html" class="active">Usage Rates</a></li>
          </ul>
        </div>
        <div class="col-3">
          <ul class="list-unstyled">
            <li><a href="placements.html">Highest Placements</a></li>
          </ul>
        </div>
      </div>
    </div>
  </nav>

  <section>
    <h2>Pokémon Usage Data By Percentage</h2>
    <div class="filter-container">
      <label for="tournamentFilter">Select Tournament:</label>
      <select id="tournamentFilter" class="form-select" onchange="updateChartData()">
        <option value="charlotte">Charlotte</option>
        <option value="portland">Portland</option>
        <option value="liverpool">Liverpool</option>
        <option value="knoxville">Knoxville</option>
        <option value="dortmund">Dortmund</option>
        <option value="utrecht">Utrecht</option>
        <option value="vancouver">Vancouver</option>
        <option value="orlando">Orlando</option>
        <option value="indianapolis">Indianapolis</option>
        <option value="stockholm">Stockholm</option>
        <option value="losangeles">Los Angeles</option>
        <option value="bologna">Bologna</option>
      </select>
    </div>

    <div class="chart-container">
      <canvas id="pokemonChart"></canvas>
    </div>
  </section>

  <script>
    const pokemonCtx = document.getElementById('pokemonChart').getContext('2d');
    const chartData = {
      charlotte: [28.5, 61.7, 12.5, 43.5, 26.7, 18.1, 64.8],
      portland: [42.8, 57.4, 27.2, 43.75, 26.2, 15.4, 46.86],
      liverpool: [38.3, 67.3, 22.8, 51.2, 30.9, 19.3, 67.97],
      knoxville: [38.8, 57, 24.6, 51.7, 30.8, 21.2, 71.88],
      dortmund: [41.9, 57.2, 23.2, 55.7, 30.5, 21.8, 71.09],
      utrecht: [40.6, 55, 26.6, 50.7, 27.1, 19.1, 64.84],
      vancouver: [40.9, 41.7, 26.2, 47.4, 27.8, 30.6, 64.06],
      orlando: [45.2, 45.6, 29.9, 52.7, 24.8, 21, 51.56],
      indianapolis: [61.58, 27.86, 34.16, 50.3, 33.58, 38.56, 21.88],
      stockholm: [60.5, 23.4, 32, 46.9, 23, 40.2, 24.22],
      losangeles: [41.19, 26.19, 30.15, 30.49, 27.35, 21.91, 28.91],
      bologna: [49.9, 30.2, 33.3, 46.86, 26.3, 26.2, 25.78],
    };
    const pokemonLabels = ['Incineroar', 'Flutter Mane', 'Rillaboom', 'Urshifu', 'Tornadus', 'Amoongus', 'Ogerpon'];
    const pokemonChart = new Chart(pokemonCtx, {
      type: 'radar',
      data: {
        labels: pokemonLabels,
        datasets: [{
          label: 'Usage Rate (%)',
          data: chartData.charlotte,
          backgroundColor: 'rgba(75, 192, 192, 0.2)',
          borderColor: 'rgba(75, 192, 192, 1)',
          borderWidth: 1,
        }],
      },
    });

    function updateChartData() {
      const selectedTournament = document.getElementById('tournamentFilter').value;
      pokemonChart.data.datasets[0].data = chartData[selectedTournament];
      pokemonChart.update();
    }

    window.addEventListener('resize', function() {
      pokemonChart.resize();
    });
  </script>
</body>
</html>
